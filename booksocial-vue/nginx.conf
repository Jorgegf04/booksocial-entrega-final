server {
  listen 80;
  root  /usr/share/nginx/html;
  index index.html;

  # Proxy al backend para todas las llamadas de la SPA.
  location /api/ {
    proxy_pass         http://backend-api:9999/api/;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
  }

  # Swagger UI y OpenAPI — accesible en http://localhost:8080/swagger-ui/
  location /swagger-ui/ {
    proxy_pass         http://backend-api:9999/swagger-ui/;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  }

  location /v3/api-docs {
    proxy_pass         http://backend-api:9999/v3/api-docs;
    proxy_set_header   Host              $host;
  }

  # Vue Router — HTML5 history mode
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache permanente para assets con hash de Vite
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Sin caché en index.html para que los deployments se reflejen de inmediato
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
