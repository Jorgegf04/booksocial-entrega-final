spring.application.name=booksocial-backend

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=9999

# ===============================
# DATABASE - Elige solo una seccion
# ===============================

# --- DESARROLLO: H2 (comentar si usas MySQL) ---
# spring.datasource.url=jdbc:h2:file:C:/Users/jgfes/booksocial-data/booksocial
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# --- PRODUCCION: MySQL / XAMPP / Workbench (descomentar si usas MySQL) ---
# En Docker, SPRING_DATASOURCE_URL se inyecta como variable de entorno y apunta a mysql-db:3306.
# El valor por defecto (localhost:3306) es solo para desarrollo local con XAMPP.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/booksocial?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVERCLASSNAME:com.mysql.cj.jdbc.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.h2.console.enabled=false


# ===============================x
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false


# ===============================
# MAIL (Gmail SMTP)
# Pasos: Gmail → Cuenta → Seguridad → Contraseñas de aplicación (requiere 2FA).
# Establece MAIL_USERNAME y MAIL_PASSWORD como variables de entorno.
# ===============================
# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
upload.dir=${UPLOAD_DIR:uploads}
# En Docker, BACKEND_URL=http://localhost:8080 (proxy nginx del frontend Vue).
# En local con XAMPP, queda como localhost:9999.
upload.base-url=${UPLOAD_BASE_URL:${BACKEND_URL:http://localhost:9999}}
seeder.force-reseed=${FORCE_RESEED:false}

# ===============================
# ACTUATOR (healthcheck de Docker)
# ===============================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ===============================
# MAIL (Gmail SMTP)
# ===============================
spring.mail.host=${MAIL_HOST:}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.test-connection=false

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.example.booksocial_backend=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/booksocial.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
