# REF-10/BOOKSOCIAL/DOCKERCOMPOSE.YML
services:

  # Contenedor para base de datos
  # Solo en la red privada. 
  mysql-db:
    image: mysql:8.4
    container_name: mysql-db
    restart: unless-stopped
    command: >
      --innodb-buffer-pool-size=128M
      --innodb-log-buffer-size=8M
      --max-connections=50
      --performance-schema=OFF
      --skip-log-bin
    mem_limit: 400m
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-booksocial}
      MYSQL_ROOT_HOST: '%'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - private-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend-api:
    build:
      context: ./booksocial-backend/booksocial-backend
      dockerfile: Dockerfile
    container_name: backend-api
    restart: unless-stopped
    expose:
      - "9999"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-db:3306/booksocial?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true"
      SPRING_DATASOURCE_DRIVERCLASSNAME: com.mysql.cj.jdbc.Driver
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_H2_CONSOLE_ENABLED: "false"
      UPLOAD_DIR: /app/images
      UPLOAD_BASE_URL: ""
      BACKEND_URL: http://localhost:8080
      FORCE_RESEED: "false"
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    volumes:
      - images_data:/app/images
    networks:
      - private-network
    depends_on:
      mysql-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Contenedor para el frontend Thymeleaf
  # En AMBAS redes: puede hablar con backend (private-network) y es alcanzable
  # por nginx-thymeleaf. No expone puertos al host.
  frontend-thymeleaf:
    build:
      context: ./booksocial-frontend
      dockerfile: Dockerfile
    container_name: frontend-thymeleaf
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      SERVER_PORT: "8000"
      API_BASE_URL: http://backend-api:9999/api
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    networks:
      - public-network
      - private-network
    depends_on:
      backend-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Contenedor para Nginx — proxy inverso para Thymeleaf 
  # Termina HTTP/HTTPS en los puertos 80 y 443 del host y hace proxy a Tomcat (puerto 8000).
  # En ambas redes: publica hacia el host y privada para reenviar /api/* al backend.
  nginx-thymeleaf:
    image: nginx:alpine
    container_name: nginx-thymeleaf
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./booksocial-frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./booksocial-frontend/certs:/etc/nginx/certs:ro
    networks:
      - public-network
      - private-network
    depends_on:
      frontend-thymeleaf:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Contenedor para Vue.js 
  # Accesible desde el host en puerto 8080. Su nginx interno hace proxy de
  # /api/* al backend por la red privada. VITE_API_BASE_URL=/api es relativo
  # al origen del navegador (localhost:8080).
  frontend-vue:
    build:
      context: ./booksocial-vue
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: frontend-vue
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - public-network
      - private-network
    depends_on:
      backend-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  # Red pública: frontends expuestos al host / Internet
  public-network:
    driver: bridge
  # Red privada: backend + MySQL, sin acceso directo desde el host
  private-network:
    driver: bridge

volumes:
  mysql_data:    # Persistencia de la base de datos
  images_data:   # Imágenes subidas, compartidas entre backend y frontends
