
spring.application.name=booksocial-frontend

server.port=8000

# En Docker, API_BASE_URL=http://backend-api:9999/api (nombre del servicio en la red privada).
# El valor por defecto (localhost:9999) es solo para desarrollo local.
api.base-url=${API_BASE_URL:http://localhost:9999/api}

spring.thymeleaf.cache=false

# ===============================
# FILE UPLOAD (multipart — formularios con imagen en el admin)
# El backend acepta 10MB; el frontend debe permitir al menos lo mismo.
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# ===============================
# MAIL (Gmail SMTP)
# Pasos: Gmail → Cuenta → Seguridad → Contraseñas de aplicación (requiere 2FA).
# Establece MAIL_USERNAME y MAIL_PASSWORD como variables de entorno,
# o sustitúyelas directamente aquí en desarrollo.
# ===============================
spring.mail.host=${MAIL_HOST:}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.test-connection=false

# ===============================
# ACTUATOR (healthcheck de Docker)
# ===============================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
