<!DOCTYPE html>

<!--
  Vista Thymeleaf: Error basico.
  Funcion: Muestra un error generico con estado y ruta.
  Atributos del modelo: status, path.
  Nota: los atributos se leen con th:text, th:if, th:each, th:href y th:action.
-->
<html xmlns:th="http://www.thymeleaf.org">

<!-- Cabecera HTML: metadatos, titulo y hojas de estilo de la vista. -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <title th:text="'Error ' + ${status} + ' — BookSocial'">Error — BookSocial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" th:href="@{/css/main.css}">
  
  <link rel="stylesheet" th:href="@{/css/pages/public/error.css}">
</head>


<!-- Cuerpo de la pagina: aqui se montan los fragmentos y el contenido visible. -->
<body class="error-body">

<div th:replace="~{fragments/messages :: backendStatus}"></div>

<div class="error-box">

  
  
  <div class="error-code" th:text="${status}">500</div>

  
  
  <h1 class="error-title"
      th:text="${status == 404} ? 'Página no encontrada'
             : (status == 403 ? 'Acceso denegado'
             : (status == 503 or status == 502 ? 'Servicio no disponible'
             : 'Error inesperado'))">Error</h1>

  
  <p class="error-msg"
     th:text="${status == 404} ? 'El recurso que buscas no existe o ha sido eliminado.'
            : (status == 403 ? 'No tienes permisos para acceder a esta página.'
            : (status == 503 or status == 502 ? 'No se puede conectar con el servidor. Inténtalo más tarde.'
            : 'Ha ocurrido un error inesperado. Por favor, inténtelo más tarde.'))">
    Ha ocurrido un error.
  </p>

  
  
  <div th:if="${path != null}" class="error-path" th:text="'Ruta: ' + ${path}"></div>

  
  <div>
    
    <a href="javascript:history.back()" class="btn-back">← Volver</a>
    
    <a href="/catalog" class="btn-secondary-link">Ir al catálogo</a>
  </div>

  
  <p class="error-branding">
    <strong>BookSocial</strong> — El Curador Digital
  </p>
</div>
</body>
</html>
