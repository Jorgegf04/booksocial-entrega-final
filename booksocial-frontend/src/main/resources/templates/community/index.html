<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comunidad — BookSocial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/main.css}">
  
  <link rel="stylesheet" th:href="@{/css/pages/public/community.css}">
</head>
<body>

  
  
  <div th:replace="~{fragments/navbar :: navbar}"></div>

  
  
  <main class="container community-main">

    
    <div th:replace="~{fragments/messages :: messages}"></div>

    
    <div class="d-flex align-items-end justify-content-between mb-4 flex-wrap gap-3">
      <div>
        
        <p class="filter-section-title mb-1">Lectores</p>
        
        <h1 class="font-serif mb-0 community-heading">Comunidad</h1>
      </div>

      
      <div class="input-group community-search-group">
        
        <input id="searchInput" type="text"
               class="form-control form-control-sm community-search-input"
               placeholder="Buscar usuario...">
        
        <span class="input-group-text community-search-btn">
          <span class="material-symbols-outlined community-search-icon">search</span>
        </span>
      </div>
    </div>

    
    
    <div th:if="${users == null or users.isEmpty()}"
         class="text-center py-5 community-empty">
      <span class="material-symbols-outlined d-block mb-2 community-empty-icon">group</span>
      <p class="font-serif mb-1 community-empty-text">
        Aún no hay otros lectores
      </p>
    </div>

    
    
    <div id="userGrid" class="row g-3"
         
         th:if="${users != null and !users.isEmpty()}">

      
      
      <div th:each="u : ${users}"
           class="col-sm-6 col-md-4 col-lg-3 user-card-col"
           th:attr="data-username=${u.username}">

        
        <div class="card h-100 text-center community-user-card">

          <div class="card-body d-flex flex-column align-items-center pt-4 pb-3 gap-2">

            
            <a th:href="@{'/user/' + ${u.id}}" class="text-decoration-none">
              
              
              <img th:if="${u.img != null and !u.img.isEmpty()}"
                   th:src="${u.img}" th:alt="${u.username}"
                   class="community-user-avatar">
              
              <div th:unless="${u.img != null and !u.img.isEmpty()}"
                   class="profile-avatar-placeholder community-avatar-placeholder"
                   th:text="${u.username != null ? #strings.substring(u.username,0,1).toUpperCase() : '?'}">
              </div>
            </a>

            
            
            <a th:href="@{'/user/' + ${u.id}}"
               class="text-decoration-none community-user-name"
               th:text="${u.username}">username</a>

            
            
            <p class="mb-0 community-user-fullname"
               th:text="${(u.name != null ? u.name : '') + (u.secondName != null ? ' ' + u.secondName : '')}"></p>

            
            <span class="profile-badge"
                  th:classappend="${u.role == 'ADMIN'} ? 'admin' : (${u.role == 'SUBSCRIBED'} ? 'subscribed' : '')"
                  th:text="${u.role != null ? u.role : 'USER'}">USER</span>

            
            <div class="mt-auto pt-2 w-100"
                 
                 th:if="${sessionUserId != null}">

              
              
              <form th:if="${followingIds == null or !followingIds.contains(u.id)}"
                    th:action="@{'/community/' + ${u.id} + '/follow'}"
                    method="post">
                <button type="submit"
                        class="btn-primary-pill w-100 community-follow-btn">
                  Seguir
                </button>
              </form>

              
              
              <form th:if="${followingIds != null and followingIds.contains(u.id)}"
                    th:action="@{'/community/' + ${u.id} + '/unfollow'}"
                    method="post">
                <button type="submit"
                        class="w-100 community-unfollow-btn">
                  Siguiendo ✓
                </button>
              </form>

            </div>

            
            
            <div class="mt-auto pt-2 w-100" th:if="${sessionUserId == null}">
              
              <a th:href="@{'/user/' + ${u.id}}"
                 class="btn-primary-pill d-block text-center text-decoration-none community-view-profile-btn">
                Ver perfil
              </a>
            </div>

          </div>
        </div>
      </div>

    </div>

    
    <div id="emptySearch" class="text-center py-5" style="display:none;">
      <span class="material-symbols-outlined d-block mb-2 community-search-empty-icon">search_off</span>
      <p class="community-search-empty-text">Ningún usuario coincide con la búsqueda.</p>
    </div>

  </main>

  
  
  <div th:replace="~{fragments/footer :: footer}"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
  (function () {
    const input = document.getElementById('searchInput');
    const cols  = document.querySelectorAll('.user-card-col');
    const empty = document.getElementById('emptySearch');

    if (!input) return;

    input.addEventListener('input', function () {
      const q = this.value.trim().toLowerCase();
      let visible = 0;
      cols.forEach(col => {
        const name = (col.dataset.username || '').toLowerCase();
        const show = !q || name.includes(q);
        col.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      if (empty) empty.style.display = (q && visible === 0) ? '' : 'none';
    });
  })();
  </script>

</body>
</html>
