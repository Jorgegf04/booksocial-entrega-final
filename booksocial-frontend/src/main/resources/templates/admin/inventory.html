<!DOCTYPE html>

<!--
  Vista Thymeleaf: Admin inventario.
  Funcion: Gestiona productos, stock, precios y ediciones disponibles.
  Atributos del modelo: products, editions, success, error.
  Nota: los atributos se leen con th:text, th:if, th:each, th:href y th:action.
-->
<html xmlns:th="http://www.thymeleaf.org">

<!-- Cabecera HTML: metadatos, titulo y hojas de estilo de la vista. -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inventario — Admin BookSocial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" th:href="@{/css/main.css}">
  
  <link rel="stylesheet" th:href="@{/css/pages/admin/admin-shared.css}">
</head>

<!-- Cuerpo de la pagina: aqui se montan los fragmentos y el contenido visible. -->
<body class="admin-body">
<div class="admin-layout">

  
  
  
<!-- Sidebar admin: fragmento comun del menu lateral del panel. -->
<div th:replace="~{admin/fragments/sidebar :: sidebar('inventory')}"></div>

  
  
<!-- Contenido principal: zona central que cambia en cada vista. -->
<main class="admin-main">

    
    
    
<!-- Cabecera de administracion: titulo de pagina y boton principal. -->
<div class="admin-topbar">
      <div>
        <h1 class="admin-page-title">Inventario</h1>
        <p class="admin-page-subtitle">Productos disponibles y estado de stock</p>
      </div>
      <button type="button" class="btn btn-sm btn-primary d-flex align-items-center gap-1"
              data-bs-toggle="modal" data-bs-target="#createProductModal">
        <span class="material-symbols-outlined admin-topbar-btn-icon">add</span>
        Nuevo Producto
      </button>
    </div>

    
    
    
<!-- Mensajes de resultado: muestra avisos de exito o error enviados por el controlador. -->
<div th:if="${success}" class="alert alert-success alert-dismissible fade show mx-0 mb-3" role="alert">
      <span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mx-0 mb-3" role="alert">
      <span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    
    
<!-- Tarjeta de administracion: contiene el listado principal de registros. -->
<div class="admin-card">
      <div class="admin-card-header">
        <p class="admin-card-title">Productos disponibles
          
          <span class="admin-table-count"
                th:text="'(' + ${#lists.size(products)} + ' total)'"></span>
        </p>
      </div>
      <div class="table-responsive">
        
        
<!-- Tabla de datos: muestra los objetos recibidos del modelo y sus acciones. -->
<table class="admin-table">
          <thead>
            <tr>
              <th>Obra</th>
              <th>Editorial</th>
              <th>ISBN</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            
            
            <tr th:each="p : ${products}">
              <td>
                
                <div class="admin-table-name" th:text="${p.workTitle}">—</div>
                
                <div class="admin-inv-edition"
                     th:text="${p.editionTitle != null} ? ${p.editionTitle} : ''">
                </div>
              </td>
              
              <td class="admin-table-meta" th:text="${p.editorialName}">—</td>
              
              <td class="admin-inv-isbn"
                  th:text="${p.editionIsbn != null} ? ${p.editionIsbn} : '—'">—</td>
              
              <td class="admin-inv-price"
                  th:text="'€' + ${#numbers.formatDecimal(p.price != null ? p.price : 0, 1, 2)}">€0.00</td>
              <td>
                
                <span class="admin-stock-badge"
                      th:classappend="${p.stock == 0} ? 'admin-stock-empty' : (${p.stock <= 5} ? 'admin-stock-low' : 'admin-stock-ok')"
                      th:text="${p.stock} + ' uds.'">0</span>
              </td>
              <td>
                <button type="button" class="btn btn-sm btn-outline-secondary p-1"
                        title="Ajustar stock"
                        data-bs-toggle="modal" data-bs-target="#stockModal"
                        th:data-editionid="${p.editionId}"
                        th:data-worktitle="${p.workTitle}"
                        th:data-isbn="${p.editionIsbn}"
                        th:data-stock="${p.stock}"
                        onclick="openStockModal(this)">
                  <span class="material-symbols-outlined admin-table-action-icon">inventory</span>
                </button>
              </td>
            </tr>
            
            
            <tr th:if="${products == null or products.isEmpty()}">
              
              <td colspan="6" class="text-center py-4 admin-table-empty">
                No hay productos disponibles
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>



<!-- Modal Bootstrap: ventana emergente para crear, editar, confirmar o mostrar informacion. -->
<div class="modal fade" id="createProductModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Nuevo Producto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      
<!-- Formulario: envia datos al controlador mediante los atributos th:action, method y campos name. -->
<form method="post" th:action="@{/admin/inventory/create}">
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-semibold">
                Edicion <span class="text-danger">*</span>
              </label>
              <select name="editionId" class="form-select form-select-sm" required>
                <option value="">— Selecciona una edicion —</option>
                <option th:each="edicion : ${editions}"
                        th:value="${edicion.id}"
                        th:text="${edicion.title + ' — ' + (edicion.workTitle != null ? edicion.workTitle : 'Sin obra')}">
                  Edicion
                </option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">
                Precio (€) <span class="text-danger">*</span>
              </label>
              <input type="number" name="price" min="0.01" step="0.01"
                     class="form-control form-control-sm" placeholder="Ej: 12.99" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">
                Stock <span class="text-danger">*</span>
              </label>
              <input type="number" name="stock" min="0"
                     class="form-control form-control-sm" placeholder="Ej: 50" required>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-sm btn-primary">Crear Producto</button>
        </div>
      </form>
    </div>
  </div>
</div>


<!-- Modal Bootstrap: ventana emergente para crear, editar, confirmar o mostrar informacion. -->
<div class="modal fade" id="stockModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Ajustar stock</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      
<!-- Formulario: envia datos al controlador mediante los atributos th:action, method y campos name. -->
<form id="stockForm" method="post">
        <div class="modal-body">
          <p class="admin-tracking-order mb-1">
            <strong id="stockWorkTitle"></strong>
          </p>
          <p class="admin-tracking-note mb-3">
            ISBN: <span id="stockIsbn"></span>
          </p>
          <label class="form-label fw-semibold">Nuevo stock <span class="text-danger">*</span></label>
          <input type="number" id="stockInput" name="newStock" class="form-control form-control-sm"
                 min="0" required>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-sm btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>


<!-- JavaScript de la vista: gestiona interacciones del navegador sin cambiar el modelo del servidor. -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JavaScript de la vista: gestiona interacciones del navegador sin cambiar el modelo del servidor. -->
<script>
  function openStockModal(btn) {
    document.getElementById('stockForm').action = '/admin/inventory/' + btn.dataset.editionid + '/stock';
    document.getElementById('stockWorkTitle').textContent = btn.dataset.worktitle || '—';
    document.getElementById('stockIsbn').textContent = btn.dataset.isbn || '—';
    document.getElementById('stockInput').value = btn.dataset.stock || 0;
  }
</script>
</body>
</html>
