<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editoriales — Admin BookSocial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" th:href="@{/css/main.css}">
  
  <link rel="stylesheet" th:href="@{/css/pages/admin/admin-shared.css}">
</head>
<body class="admin-body">
<div class="admin-layout">

  
  
  <div th:replace="~{admin/fragments/sidebar :: sidebar('editorials')}"></div>

  
  <main class="admin-main">

    
    
    <div class="admin-topbar">
      <div>
        <h1 class="admin-page-title">Editoriales</h1>
        <p class="admin-page-subtitle">Gestión de editoriales del catálogo</p>
      </div>
      <button class="btn btn-sm btn-primary d-flex align-items-center gap-1"
              data-bs-toggle="modal" data-bs-target="#createEditorialModal">
        
        <span class="material-symbols-outlined admin-topbar-btn-icon">add</span>
        Nueva Editorial
      </button>
    </div>

    
    
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show mx-0 mb-3" role="alert">
      <span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mx-0 mb-3" role="alert">
      <span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    
    <div class="admin-card">
      <div class="admin-card-header">
        <p class="admin-card-title">
          Todas las editoriales
          
          <span class="admin-table-count"
                th:text="'(' + ${#lists.size(editorials)} + ' total)'"></span>
        </p>
      </div>
      <div class="table-responsive">
        
        <table class="admin-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>País</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            
            
            <tr th:each="editorial : ${editorials}">
              
              <td class="admin-table-id" th:text="${editorial.id}">—</td>
              <td>
                
                <span class="admin-table-name" th:text="${editorial.name}">—</span>
              </td>
              
              <td class="admin-table-meta"
                  th:text="${editorial.country != null} ? ${editorial.country} : '—'">—</td>
              <td>
                <div class="d-flex gap-1">
                  
                  <button type="button" class="btn btn-sm btn-outline-secondary p-1"
                          title="Editar"
                          data-bs-toggle="modal" data-bs-target="#editEditorialModal"
                          th:data-id="${editorial.id}"
                          th:data-name="${editorial.name}"
                          th:data-country="${editorial.country}"
                          onclick="openEditEditorialModal(this)">
                    
                    <span class="material-symbols-outlined admin-table-action-icon">edit</span>
                  </button>
                  <button type="button" class="btn btn-sm btn-outline-danger p-1"
                          title="Eliminar"
                          data-bs-toggle="modal" data-bs-target="#deleteEditorialModal"
                          th:data-id="${editorial.id}"
                          th:data-name="${editorial.name}"
                          onclick="openDeleteEditorialModal(this)">
                    <span class="material-symbols-outlined admin-table-action-icon">delete</span>
                  </button>
                </div>
              </td>
            </tr>
            
            
            <tr th:if="${editorials == null or editorials.isEmpty()}">
              
              <td colspan="4" class="text-center py-4 admin-table-empty">
                No hay editoriales registradas
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>


<div class="modal fade" id="createEditorialModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Nueva Editorial</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      
      <form method="post" th:action="@{/admin/editorials/create}">
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
              <input type="text" name="name" class="form-control form-control-sm" required>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">País</label>
              <input type="text" name="country" class="form-control form-control-sm"
                     placeholder="Ej: España">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-sm btn-primary">Crear Editorial</button>
        </div>
      </form>
    </div>
  </div>
</div>


<div class="modal fade" id="editEditorialModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Editar Editorial</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="editEditorialForm" method="post">
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
              <input type="text" id="editEditorialName" name="name" class="form-control form-control-sm" required>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">País</label>
              <input type="text" id="editEditorialCountry" name="country" class="form-control form-control-sm">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-sm btn-primary">Guardar Cambios</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal fade" id="deleteEditorialModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Eliminar Editorial</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        
        <p class="admin-modal-confirm">¿Seguro que quieres eliminar la editorial
          <strong id="deleteEditorialName"></strong>?
          Esta acción no se puede deshacer.
        </p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <form id="deleteEditorialForm" method="post" class="d-inline">
          <button type="submit" class="btn btn-sm btn-danger">Eliminar</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function openEditEditorialModal(btn) {
    document.getElementById('editEditorialForm').action = '/admin/editorials/' + btn.dataset.id + '/update';
    document.getElementById('editEditorialName').value = btn.dataset.name || '';
    document.getElementById('editEditorialCountry').value = btn.dataset.country || '';
  }

  function openDeleteEditorialModal(btn) {
    document.getElementById('deleteEditorialForm').action = '/admin/editorials/' + btn.dataset.id + '/delete';
    document.getElementById('deleteEditorialName').textContent = '"' + btn.dataset.name + '"';
  }
</script>
</body>
</html>
