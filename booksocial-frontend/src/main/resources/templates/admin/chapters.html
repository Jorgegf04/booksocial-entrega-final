<!DOCTYPE html>

<!--
  Vista Thymeleaf: Admin capitulos.
  Funcion: Gestiona capitulos asociados a tomos.
  Atributos del modelo: chapters, tomes, success, error.
  Nota: los atributos se leen con th:text, th:if, th:each, th:href y th:action.
-->
<html xmlns:th="http://www.thymeleaf.org">

<!-- Cabecera HTML: metadatos, titulo y hojas de estilo de la vista. -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Capítulos — Admin BookSocial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" th:href="@{/css/main.css}">
  
  <link rel="stylesheet" th:href="@{/css/pages/admin/admin-shared.css}">
</head>

<!-- Cuerpo de la pagina: aqui se montan los fragmentos y el contenido visible. -->
<body class="admin-body">
<div class="admin-layout">

  
  
  
<!-- Sidebar admin: fragmento comun del menu lateral del panel. -->
<div th:replace="~{admin/fragments/sidebar :: sidebar('chapters')}"></div>

  
  
<!-- Contenido principal: zona central que cambia en cada vista. -->
<main class="admin-main">

    
    
    
<!-- Cabecera de administracion: titulo de pagina y boton principal. -->
<div class="admin-topbar">
      <div>
        <h1 class="admin-page-title">Capítulos</h1>
        <p class="admin-page-subtitle">Gestión de capítulos de manga</p>
      </div>
      <button class="btn btn-sm btn-primary d-flex align-items-center gap-1"
              data-bs-toggle="modal" data-bs-target="#createChapterModal">
        
        <span class="material-symbols-outlined admin-topbar-btn-icon">add</span>
        Nuevo Capítulo
      </button>
    </div>

    
    
    
<!-- Mensajes de resultado: muestra avisos de exito o error enviados por el controlador. -->
<div th:if="${success}" class="alert alert-success alert-dismissible fade show mx-0 mb-3" role="alert">
      <span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mx-0 mb-3" role="alert">
      <span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    
    
<!-- Tarjeta de administracion: contiene el listado principal de registros. -->
<div class="admin-card">
      <div class="admin-card-header">
        <p class="admin-card-title">
          Todos los capítulos
          
          <span class="admin-table-count"
                th:text="'(' + ${#lists.size(chapters)} + ' total)'"></span>
        </p>
      </div>
      <div class="table-responsive">
        
        
<!-- Tabla de datos: muestra los objetos recibidos del modelo y sus acciones. -->
<table class="admin-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Nº Cap.</th>
              <th>Título</th>
              <th>Tomo</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            
            
            <tr th:each="chapter : ${chapters}">
              
              <td class="admin-table-id" th:text="${chapter.id}">—</td>
              <td>
                <span class="admin-badge" th:text="'Cap. ' + ${chapter.chapterNumber}">—</span>
              </td>
              <td>
                
                <span class="admin-table-name"
                      th:text="${chapter.title != null} ? ${chapter.title} : '—'">—</span>
              </td>
              
              <td class="admin-table-meta"
                  th:text="${chapter.tomeTitle != null} ? ${chapter.tomeTitle} : (${chapter.tomeId != null} ? 'Tomo #' + ${chapter.tomeId} : '—')">—</td>
              <td>
                <div class="d-flex gap-1">
                  <button type="button" class="btn btn-sm btn-outline-secondary p-1"
                          title="Editar"
                          data-bs-toggle="modal" data-bs-target="#editChapterModal"
                          th:data-id="${chapter.id}"
                          th:data-chapternumber="${chapter.chapterNumber}"
                          th:data-title="${chapter.title}"
                          th:data-tomeid="${chapter.tomeId}"
                          onclick="openEditChapterModal(this)">
                    
                    <span class="material-symbols-outlined admin-table-action-icon">edit</span>
                  </button>
                  <button type="button" class="btn btn-sm btn-outline-danger p-1"
                          title="Eliminar"
                          data-bs-toggle="modal" data-bs-target="#deleteChapterModal"
                          th:data-id="${chapter.id}"
                          th:data-title="${chapter.title}"
                          onclick="openDeleteChapterModal(this)">
                    <span class="material-symbols-outlined admin-table-action-icon">delete</span>
                  </button>
                </div>
              </td>
            </tr>
            
            
            <tr th:if="${chapters == null or chapters.isEmpty()}">
              
              <td colspan="5" class="text-center py-4 admin-table-empty">
                No hay capítulos registrados
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>



<!-- Modal Bootstrap: ventana emergente para crear, editar, confirmar o mostrar informacion. -->
<div class="modal fade" id="createChapterModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Nuevo Capítulo</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      
      
<!-- Formulario: envia datos al controlador mediante los atributos th:action, method y campos name. -->
<form method="post" th:action="@{/admin/chapters/create}">
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Nº Capítulo <span class="text-danger">*</span></label>
              <input type="number" name="chapterNumber" class="form-control form-control-sm" min="1" required>
            </div>
            <div class="col-md-8">
              <label class="form-label fw-semibold">Título</label>
              <input type="text" name="title" class="form-control form-control-sm">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Tomo <span class="text-danger">*</span></label>
              
              <select name="tomeId" class="form-select form-select-sm" required>
                <option value="">— Seleccionar tomo —</option>
                
                <option th:each="t : ${tomes}" th:value="${t.id}"
                        th:text="${t.title != null} ? 'T' + ${t.numberTome} + ' — ' + ${t.title} : 'Tomo #' + ${t.numberTome}"></option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-sm btn-primary">Crear Capítulo</button>
        </div>
      </form>
    </div>
  </div>
</div>



<!-- Modal Bootstrap: ventana emergente para crear, editar, confirmar o mostrar informacion. -->
<div class="modal fade" id="editChapterModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Editar Capítulo</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      
<!-- Formulario: envia datos al controlador mediante los atributos th:action, method y campos name. -->
<form id="editChapterForm" method="post">
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Nº Capítulo <span class="text-danger">*</span></label>
              <input type="number" id="editChapterNumber" name="chapterNumber" class="form-control form-control-sm" min="1" required>
            </div>
            <div class="col-md-8">
              <label class="form-label fw-semibold">Título</label>
              <input type="text" id="editChapterTitle" name="title" class="form-control form-control-sm">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Tomo <span class="text-danger">*</span></label>
              <select id="editChapterTomeId" name="tomeId" class="form-select form-select-sm" required>
                <option value="">— Seleccionar tomo —</option>
                <option th:each="t : ${tomes}" th:value="${t.id}"
                        th:text="${t.title != null} ? 'T' + ${t.numberTome} + ' — ' + ${t.title} : 'Tomo #' + ${t.numberTome}"></option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-sm btn-primary">Guardar Cambios</button>
        </div>
      </form>
    </div>
  </div>
</div>


<!-- Modal Bootstrap: ventana emergente para crear, editar, confirmar o mostrar informacion. -->
<div class="modal fade" id="deleteChapterModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Eliminar Capítulo</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        
        <p class="admin-modal-confirm">¿Seguro que quieres eliminar el capítulo
          <strong id="deleteChapterName"></strong>?
          Esta acción no se puede deshacer.
        </p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        
<!-- Formulario: envia datos al controlador mediante los atributos th:action, method y campos name. -->
<form id="deleteChapterForm" method="post" class="d-inline">
          <button type="submit" class="btn btn-sm btn-danger">Eliminar</button>
        </form>
      </div>
    </div>
  </div>
</div>


<!-- JavaScript de la vista: gestiona interacciones del navegador sin cambiar el modelo del servidor. -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JavaScript de la vista: gestiona interacciones del navegador sin cambiar el modelo del servidor. -->
<script>
  function openEditChapterModal(btn) {
    document.getElementById('editChapterForm').action = '/admin/chapters/' + btn.dataset.id + '/update';
    document.getElementById('editChapterNumber').value = btn.dataset.chapternumber || '';
    document.getElementById('editChapterTitle').value = btn.dataset.title || '';
    const sel = document.getElementById('editChapterTomeId');
    for (let opt of sel.options) {
      opt.selected = (opt.value === btn.dataset.tomeid);
    }
  }

  function openDeleteChapterModal(btn) {
    document.getElementById('deleteChapterForm').action = '/admin/chapters/' + btn.dataset.id + '/delete';
    document.getElementById('deleteChapterName').textContent = '"' + (btn.dataset.title || 'este capítulo') + '"';
  }
</script>
</body>
</html>
