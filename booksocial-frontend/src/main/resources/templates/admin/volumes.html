<!DOCTYPE html>

<!--
  Vista Thymeleaf: Admin volumenes.
  Funcion: Gestiona volumenes asociados a ediciones.
  Atributos del modelo: volumes, editions, success, error.
  Nota: los atributos se leen con th:text, th:if, th:each, th:href y th:action.
-->
<html xmlns:th="http://www.thymeleaf.org">

<!-- Cabecera HTML: metadatos, titulo y hojas de estilo de la vista. -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Volúmenes — Admin BookSocial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" th:href="@{/css/main.css}">
  
  <link rel="stylesheet" th:href="@{/css/pages/admin/admin-shared.css}">
</head>

<!-- Cuerpo de la pagina: aqui se montan los fragmentos y el contenido visible. -->
<body class="admin-body">
<div class="admin-layout">

  
  
  
<!-- Sidebar admin: fragmento comun del menu lateral del panel. -->
<div th:replace="~{admin/fragments/sidebar :: sidebar('volumes')}"></div>

  
  
<!-- Contenido principal: zona central que cambia en cada vista. -->
<main class="admin-main">

    
    
    
<!-- Cabecera de administracion: titulo de pagina y boton principal. -->
<div class="admin-topbar">
      <div>
        <h1 class="admin-page-title">Volúmenes</h1>
        <p class="admin-page-subtitle">Gestión de volúmenes de cómic</p>
      </div>
      <button class="btn btn-sm btn-primary d-flex align-items-center gap-1"
              data-bs-toggle="modal" data-bs-target="#createVolumeModal">
        
        <span class="material-symbols-outlined admin-topbar-btn-icon">add</span>
        Nuevo Volumen
      </button>
    </div>

    
    
    
<!-- Mensajes de resultado: muestra avisos de exito o error enviados por el controlador. -->
<div th:if="${success}" class="alert alert-success alert-dismissible fade show mx-0 mb-3" role="alert">
      <span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mx-0 mb-3" role="alert">
      <span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    
    
<!-- Tarjeta de administracion: contiene el listado principal de registros. -->
<div class="admin-card">
      <div class="admin-card-header">
        <p class="admin-card-title">
          Todos los volúmenes
          
          <span class="admin-table-count"
                th:text="'(' + ${#lists.size(volumes)} + ' total)'"></span>
        </p>
      </div>
      <div class="table-responsive">
        
        
<!-- Tabla de datos: muestra los objetos recibidos del modelo y sus acciones. -->
<table class="admin-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Nº Vol.</th>
              <th>Título</th>
              <th>Edición</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            
            
            <tr th:each="volume : ${volumes}">
              
              <td class="admin-table-id" th:text="${volume.id}">—</td>
              <td>
                <span class="admin-badge" th:text="'Vol. ' + ${volume.volumeNumber}">—</span>
              </td>
              <td>
                
                <span class="admin-table-name"
                      th:text="${volume.title != null} ? ${volume.title} : '—'">—</span>
              </td>
              
              <td class="admin-table-meta"
                  th:text="${volume.editionTitle != null} ? ${volume.editionTitle} : (${volume.editionId != null} ? 'Edición #' + ${volume.editionId} : '—')">—</td>
              <td>
                <div class="d-flex gap-1">
                  <button type="button" class="btn btn-sm btn-outline-secondary p-1"
                          title="Editar"
                          data-bs-toggle="modal" data-bs-target="#editVolumeModal"
                          th:data-id="${volume.id}"
                          th:data-volumenumber="${volume.volumeNumber}"
                          th:data-title="${volume.title}"
                          th:data-editionid="${volume.editionId}"
                          onclick="openEditVolumeModal(this)">
                    
                    <span class="material-symbols-outlined admin-table-action-icon">edit</span>
                  </button>
                  <button type="button" class="btn btn-sm btn-outline-danger p-1"
                          title="Eliminar"
                          data-bs-toggle="modal" data-bs-target="#deleteVolumeModal"
                          th:data-id="${volume.id}"
                          th:data-title="${volume.title}"
                          onclick="openDeleteVolumeModal(this)">
                    <span class="material-symbols-outlined admin-table-action-icon">delete</span>
                  </button>
                </div>
              </td>
            </tr>
            
            
            <tr th:if="${volumes == null or volumes.isEmpty()}">
              
              <td colspan="5" class="text-center py-4 admin-table-empty">
                No hay volúmenes registrados
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>



<!-- Modal Bootstrap: ventana emergente para crear, editar, confirmar o mostrar informacion. -->
<div class="modal fade" id="createVolumeModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Nuevo Volumen</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      
      
<!-- Formulario: envia datos al controlador mediante los atributos th:action, method y campos name. -->
<form method="post" th:action="@{/admin/volumes/create}">
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Nº Volumen <span class="text-danger">*</span></label>
              <input type="number" name="volumeNumber" class="form-control form-control-sm" min="1" required>
            </div>
            <div class="col-md-8">
              <label class="form-label fw-semibold">Título</label>
              <input type="text" name="title" class="form-control form-control-sm">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Edición <span class="text-danger">*</span></label>
              <select name="editionId" class="form-select form-select-sm" required>
                <option value="">— Seleccionar edición —</option>
                
                <option th:each="e : ${editions}" th:value="${e.id}"
                        th:text="${e.title != null} ? ${e.title} + ' (#' + ${e.id} + ')' : 'Edición #' + ${e.id}"></option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-sm btn-primary">Crear Volumen</button>
        </div>
      </form>
    </div>
  </div>
</div>



<!-- Modal Bootstrap: ventana emergente para crear, editar, confirmar o mostrar informacion. -->
<div class="modal fade" id="editVolumeModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Editar Volumen</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      
<!-- Formulario: envia datos al controlador mediante los atributos th:action, method y campos name. -->
<form id="editVolumeForm" method="post">
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Nº Volumen <span class="text-danger">*</span></label>
              <input type="number" id="editVolumeNumber" name="volumeNumber" class="form-control form-control-sm" min="1" required>
            </div>
            <div class="col-md-8">
              <label class="form-label fw-semibold">Título</label>
              <input type="text" id="editVolumeTitle" name="title" class="form-control form-control-sm">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Edición <span class="text-danger">*</span></label>
              <select id="editVolumeEditionId" name="editionId" class="form-select form-select-sm" required>
                <option value="">— Seleccionar edición —</option>
                <option th:each="e : ${editions}" th:value="${e.id}"
                        th:text="${e.title != null} ? ${e.title} + ' (#' + ${e.id} + ')' : 'Edición #' + ${e.id}"></option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-sm btn-primary">Guardar Cambios</button>
        </div>
      </form>
    </div>
  </div>
</div>


<!-- Modal Bootstrap: ventana emergente para crear, editar, confirmar o mostrar informacion. -->
<div class="modal fade" id="deleteVolumeModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Eliminar Volumen</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        
        <p class="admin-modal-confirm">¿Seguro que quieres eliminar el volumen
          <strong id="deleteVolumeName"></strong>?
          Esta acción no se puede deshacer.
        </p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        
<!-- Formulario: envia datos al controlador mediante los atributos th:action, method y campos name. -->
<form id="deleteVolumeForm" method="post" class="d-inline">
          <button type="submit" class="btn btn-sm btn-danger">Eliminar</button>
        </form>
      </div>
    </div>
  </div>
</div>


<!-- JavaScript de la vista: gestiona interacciones del navegador sin cambiar el modelo del servidor. -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JavaScript de la vista: gestiona interacciones del navegador sin cambiar el modelo del servidor. -->
<script>
  function openEditVolumeModal(btn) {
    document.getElementById('editVolumeForm').action = '/admin/volumes/' + btn.dataset.id + '/update';
    document.getElementById('editVolumeNumber').value = btn.dataset.volumenumber || '';
    document.getElementById('editVolumeTitle').value = btn.dataset.title || '';
    const sel = document.getElementById('editVolumeEditionId');
    for (let opt of sel.options) {
      opt.selected = (opt.value === btn.dataset.editionid);
    }
  }

  function openDeleteVolumeModal(btn) {
    document.getElementById('deleteVolumeForm').action = '/admin/volumes/' + btn.dataset.id + '/delete';
    document.getElementById('deleteVolumeName').textContent = '"' + (btn.dataset.title || 'este volumen') + '"';
  }
</script>
</body>
</html>
