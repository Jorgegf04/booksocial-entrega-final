<!DOCTYPE html>

<!--
  Vista Thymeleaf: Login.
  Funcion: Formulario de inicio de sesion y mensajes de acceso.
  Atributos del modelo: loginRequest, error, success.
  Nota: los atributos se leen con th:text, th:if, th:each, th:href y th:action.
-->
<html xmlns:th="http://www.thymeleaf.org">

<!-- Cabecera HTML: metadatos, titulo y hojas de estilo de la vista. -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión — BookSocial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;500;600;700;800&display=swap">
  
  <link rel="stylesheet" th:href="@{/css/main.css}">
  
  <link rel="stylesheet" th:href="@{/css/pages/public/auth.css}">
</head>

<!-- Cuerpo de la pagina: aqui se montan los fragmentos y el contenido visible. -->
<body>

<div th:replace="~{fragments/messages :: backendStatus}"></div>

<div class="auth-wrapper">

  
  <div class="auth-panel">
    
    <div class="auth-brand"><span>Book</span>Social</div>

    
    <div class="auth-panel-middle">
      
      <p class="auth-panel-quote">
        "Un libro es un sueño que tienes en tus manos."
      </p>
      
      <p class="auth-panel-sub">Neil Gaiman</p>
    </div>

    <p class="auth-panel-footer">
      © 2026 BookSocial — El Curador Digital
    </p>
  </div>

  
  
  <div class="auth-form-side">
    
    <div class="auth-card">

      <h1 class="auth-card-title">Bienvenido de nuevo</h1>
      <p class="auth-card-sub">Inicia sesión para acceder a tu biblioteca</p>

      
      
      
      
<!-- Mensajes de resultado: muestra avisos de exito o error enviados por el controlador. -->
<div th:if="${success}"
           class="alert alert-success py-2 mb-3 auth-alert-text"
           th:text="${success}"></div>

      
      
      <div th:if="${error}"
           class="alert alert-danger py-2 mb-3 auth-alert-text"
           th:text="${error}"></div>

      
      
      
<!-- Formulario: envia datos al controlador mediante los atributos th:action, method y campos name. -->
<form th:action="@{/auth/login}" th:object="${loginRequest}" method="post">
        <div class="mb-3">
          
          <label class="auth-label">Nombre de usuario</label>
          
          <input type="text"
                 th:field="*{username}"
                 class="form-control auth-input"
                 placeholder="tu_usuario"
                 autocomplete="username"
                 required>
        </div>

        <div class="mb-4">
          
          <div class="d-flex justify-content-between align-items-center">
            <label class="auth-label mb-0">Contraseña</label>
          </div>
          
          <div class="auth-input-group mt-1">
            <input type="password"
                   id="loginPassword"
                   th:field="*{password}"
                   class="form-control auth-input"
                   placeholder="••••••••"
                   autocomplete="current-password"
                   required>
            
            <button type="button" class="auth-pw-toggle" onclick="togglePw('loginPassword', this)"
                    title="Mostrar/ocultar contraseña">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        
        <button type="submit" class="auth-btn">Iniciar sesión</button>
      </form>

      
      <div class="auth-divider">o</div>

      
      
      <p class="text-center mb-0 auth-switch-text">
        ¿No tienes cuenta?
        
        <a href="/auth/register" class="auth-link ms-1">Crear cuenta</a>
      </p>
    </div>
  </div>

</div>


<!-- JavaScript de la vista: gestiona interacciones del navegador sin cambiar el modelo del servidor. -->
<script>
  /**
   * Alterna el tipo del input de contraseña entre "password" y "text".
   * @param {string} inputId - ID del input a alternar
   * @param {HTMLElement} btn - Botón que llama a la función (no usado actualmente)
   */
  function togglePw(inputId, btn) {
    const input = document.getElementById(inputId);
    input.type = input.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
