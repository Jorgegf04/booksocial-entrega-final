<!DOCTYPE html>

<!--
  Vista Thymeleaf: Listado de autores.
  Funcion: Lista autores con busqueda, filtro por nacionalidad y paginacion.
  Atributos del modelo: authors, q, nationality, nationalities, currentPage, totalPages, pageNumbers.
  Nota: los atributos se leen con th:text, th:if, th:each, th:href y th:action.
-->
<html xmlns:th="http://www.thymeleaf.org">

<!-- Cabecera HTML: metadatos, titulo y hojas de estilo de la vista. -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Autores — BookSocial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/main.css}">
  
  <link rel="stylesheet" th:href="@{/css/pages/public/author.css}">
</head>

<!-- Cuerpo de la pagina: aqui se montan los fragmentos y el contenido visible. -->
<body>



<!-- Navbar publica: fragmento comun con menu, busqueda, carrito y sesion. -->
<div th:replace="~{fragments/navbar :: navbar}"></div>



<!-- Contenido principal: zona central que cambia en cada vista. -->
<main class="container author-main">

  
  <div class="d-flex align-items-end justify-content-between mb-4 flex-wrap gap-3">
    <div>
      
      
      <p class="filter-section-title mb-1">Catálogo</p>
      
      <h1 class="font-serif mb-0 author-list-heading">Autores</h1>
    </div>

    
    
<!-- Formulario: envia datos al controlador mediante los atributos th:action, method y campos name. -->
<form action="/authors" method="get" id="authorFilterForm" class="d-flex gap-2 flex-wrap align-items-center">
      <input type="hidden" name="page" id="authorPageInput" value="0">
      <select name="nationality"
              class="form-select form-select-sm author-search-input"
              style="width:auto;min-width:160px"
              onchange="this.form.submit()">
        <option value="" th:selected="${nationality == null or nationality == ''}">Todas las nacionalidades</option>
        
        <option th:each="nat : ${nationalities}"
                th:value="${nat}"
                th:text="${nat}"
                th:selected="${nat == nationality}">
        </option>
      </select>
      <div class="input-group author-search-group">
        <input name="q" type="text"
               th:value="${q}"
               class="form-control form-control-sm author-search-input"
               placeholder="Buscar autor...">
        <button type="submit" class="input-group-text author-search-btn">
          <span class="material-symbols-outlined author-search-icon">search</span>
        </button>
      </div>
    </form>
  </div>

  
  
  
  <div th:if="${authors == null or authors.isEmpty()}"
       class="text-center py-5 author-empty">
    <span class="material-symbols-outlined d-block mb-2 author-empty-icon">person_search</span>
    <p class="font-serif mb-1 author-empty-text">
      No se encontraron autores.
    </p>
  </div>

  
  
  <div class="row g-4" th:unless="${authors == null or authors.isEmpty()}">

    
    
    <div th:each="a : ${authors}" class="col-sm-6 col-md-4 col-lg-3">
      
      <a th:href="@{'/author/' + ${a.id}}" class="text-decoration-none d-block author-card">

        
        <div class="overflow-hidden mb-3 author-card-img-wrap">
          
          
          <img th:if="${a.img != null and !a.img.isEmpty()}"
               th:src="${a.img}" th:alt="${a.name}">
          <div th:unless="${a.img != null and !a.img.isEmpty()}"
               class="d-flex align-items-center justify-content-center h-100">
            
            <span class="material-symbols-outlined author-card-placeholder-icon">person</span>
          </div>
        </div>

        
        
        <h3 class="font-serif mb-0 author-card-name"
            th:text="${a.name}">Nombre</h3>

        
        
        <p class="author-card-meta"
           th:text="${(a.nationality != null ? a.nationality : '') +
                      (a.works != null and !a.works.isEmpty() ? ' · ' + #lists.size(a.works) + ' obras' : '')}"></p>

        
        <p class="author-card-followers"
           th:text="${(a.followerCount != null ? a.followerCount : 0) + ' seguidores'}"></p>

      </a>
    </div>

  </div>

  
  
  <nav th:if="${totalPages > 1}" class="mt-5 d-flex justify-content-center" aria-label="Paginación de autores">
    
    <ul class="pagination pagination-bs gap-1 mb-0">

      <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
        <a class="page-link" href="#"
           th:onclick="${currentPage > 0} ? 'goToAuthorPage(' + ${currentPage - 1} + '); return false;' : 'return false;'"
           aria-label="Anterior">
          <span class="material-symbols-outlined catalog-pager-icon">chevron_left</span>
        </a>
      </li>

      
      <th:block th:each="p : ${pageNumbers}">
        
        <li class="page-item disabled" th:if="${p == -1}">
          <span class="page-link catalog-ellipsis">···</span>
        </li>
        
        <li class="page-item" th:if="${p != -1}"
            th:classappend="${p == currentPage} ? 'active'">
          <a class="page-link" href="#"
             th:onclick="'goToAuthorPage(' + ${p} + '); return false;'"
             th:text="${p + 1}">1</a>
        </li>
      </th:block>

      <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
        <a class="page-link" href="#"
           th:onclick="${currentPage < totalPages - 1} ? 'goToAuthorPage(' + ${currentPage + 1} + '); return false;' : 'return false;'"
           aria-label="Siguiente">
          <span class="material-symbols-outlined catalog-pager-icon">chevron_right</span>
        </a>
      </li>

    </ul>
  </nav>

</main>



<!-- Footer publico: fragmento comun con el pie de pagina. -->
<div th:replace="~{fragments/footer :: footer}"></div>


<!-- JavaScript de la vista: gestiona interacciones del navegador sin cambiar el modelo del servidor. -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JavaScript de la vista: gestiona interacciones del navegador sin cambiar el modelo del servidor. -->
<script>
  function goToAuthorPage(pageNum) {
    document.getElementById('authorPageInput').value = pageNum;
    document.getElementById('authorFilterForm').submit();
  }
</script>
</body>
</html>
