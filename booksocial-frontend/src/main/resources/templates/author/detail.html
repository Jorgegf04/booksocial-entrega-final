<!DOCTYPE html>

<!--
  Vista Thymeleaf: Detalle de autor.
  Funcion: Muestra ficha del autor, obras relacionadas y boton de seguimiento.
  Atributos del modelo: author, following, loggedIn, followSuccess, followError.
  Nota: los atributos se leen con th:text, th:if, th:each, th:href y th:action.
-->
<html xmlns:th="http://www.thymeleaf.org">

<!-- Cabecera HTML: metadatos, titulo y hojas de estilo de la vista. -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${author.name} + ' — BookSocial'">Autor — BookSocial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/main.css}">
  
  <link rel="stylesheet" th:href="@{/css/pages/public/author.css}">
</head>

<!-- Cuerpo de la pagina: aqui se montan los fragmentos y el contenido visible. -->
<body>



<!-- Navbar publica: fragmento comun con menu, busqueda, carrito y sesion. -->
<div th:replace="~{fragments/navbar :: navbar}"></div>



<!-- Contenido principal: zona central que cambia en cada vista. -->
<main class="container author-main">

  
  
  <div th:if="${followSuccess}" class="alert alert-success alert-dismissible fade show mb-4" role="alert">
    <span class="material-symbols-outlined align-middle me-1 author-search-icon">check_circle</span>
    <span th:text="${followSuccess}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  
  <div th:if="${followError}" class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
    <span th:text="${followError}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  
  <div class="row g-5">

    
    
<!-- Barra lateral: filtros o navegacion secundaria de la pantalla. -->
<aside class="col-lg-4">
      
      <div class="sticky-top author-detail-sticky">

        
        
        <div class="mb-4 rounded-lg overflow-hidden author-detail-photo">
          
          <img th:if="${author.img != null and !author.img.isEmpty()}"
               th:src="${author.img}" th:alt="${author.name}">
          
          <div th:unless="${author.img != null and !author.img.isEmpty()}"
               class="d-flex align-items-center justify-content-center h-100 author-detail-photo-placeholder">
            <span class="material-symbols-outlined author-detail-placeholder-icon">person</span>
          </div>
        </div>

        
        
        <h1 class="font-serif mb-1 author-detail-name"
            th:text="${author.name}">Nombre del autor</h1>
        
        <p class="mb-3 author-detail-nationality"
           th:text="${author.nationality != null ? author.nationality : ''}"></p>

        
        
        <div class="d-flex gap-4 py-3 mb-4 author-detail-stats">
          <div>
            
            <div class="font-serif fw-bold author-stat-num"
                 th:text="${author.followerCount != null ? author.followerCount : 0}">0</div>
            <div class="author-stat-label">Seguidores</div>
          </div>
          <div>
            
            <div class="font-serif fw-bold author-stat-num"
                 th:text="${author.works != null ? #lists.size(author.works) : 0}">0</div>
            <div class="author-stat-label">Obras</div>
          </div>
          
          <div th:if="${author.birthDate != null}">
            
            <div class="font-serif fw-bold author-stat-num"
                 th:text="${#temporals.year(author.birthDate)}">—</div>
            <div class="author-stat-label">Nacimiento</div>
          </div>
        </div>

        
        
        
        <th:block th:if="${loggedIn}">

          
          
          
<!-- Formulario: envia datos al controlador mediante los atributos th:action, method y campos name. -->
<form th:if="${!following}" th:action="@{'/author/' + ${author.id} + '/follow'}" method="post">
            <button type="submit"
                    class="btn-primary-pill w-100 d-flex align-items-center justify-content-center gap-2 author-action-btn">
              <span class="material-symbols-outlined author-search-icon">person_add</span>
              Seguir autor
            </button>
          </form>

          
          
          
<!-- Formulario: envia datos al controlador mediante los atributos th:action, method y campos name. -->
<form th:if="${following}" th:action="@{'/author/' + ${author.id} + '/unfollow'}" method="post">
            <button type="submit"
                    class="w-100 d-flex align-items-center justify-content-center gap-2 author-unfollow-btn">
              <span class="material-symbols-outlined author-search-icon">how_to_reg</span>
              Siguiendo ✓
            </button>
          </form>

        </th:block>

        
        
        <a th:unless="${loggedIn}" href="/auth/login"
           class="btn-primary-pill d-block text-center text-decoration-none author-action-btn">
          Inicia sesión para seguir
        </a>

      </div>
    </aside>

    
    
<!-- Seccion visual: bloque independiente del maquetado de la pagina. -->
<section class="col-lg-8">

      
      <div class="d-flex align-items-end gap-3 mb-5">
        
        <h2 class="font-serif mb-0 author-works-heading">Obras del autor</h2>
        
        <div class="flex-grow-1 author-works-divider"></div>
      </div>

      
      
      <div th:if="${author.works == null or author.works.isEmpty()}"
           class="text-center py-5 author-empty">
        <span class="material-symbols-outlined d-block mb-2 author-empty-icon">menu_book</span>
        <p class="font-serif mb-1 author-works-empty-text">
          Aún no hay obras registradas para este autor.
        </p>
      </div>

      
      
      <div class="row g-5" th:unless="${author.works == null or author.works.isEmpty()}">

        
        
        <div th:each="work, iterStat : ${author.works}"
             th:classappend="${iterStat.index % 2 == 1} ? ' mt-5'"
             class="col-sm-6">

          
          <a th:href="@{'/work/' + ${work.id}}" class="text-decoration-none d-block group-work">

            
            
            <div class="overflow-hidden mb-3 author-work-cover">
              
              <img th:if="${work.img != null and !work.img.isEmpty()}"
                   th:src="${work.img}" th:alt="${work.title}">
              <div th:unless="${work.img != null and !work.img.isEmpty()}"
                   class="d-flex align-items-center justify-content-center h-100">
                <span class="material-symbols-outlined author-work-cover-icon">menu_book</span>
              </div>

              
              
              <span th:if="${work.genre != null}"
                    th:text="${work.genre}"
                    class="position-absolute author-work-genre-badge"></span>
            </div>

            
            
            <h3 class="font-serif mb-1 author-work-title"
                th:text="${work.title}">Título</h3>
            
            <p class="author-work-meta"
               th:text="${(work.type != null ? work.type : '') + (work.publicationDate != null ? ' · ' + #temporals.year(work.publicationDate) : '')}"></p>

          </a>
        </div>
      </div>

    </section>
  </div>

</main>



<!-- Footer publico: fragmento comun con el pie de pagina. -->
<div th:replace="~{fragments/footer :: footer}"></div>


<!-- JavaScript de la vista: gestiona interacciones del navegador sin cambiar el modelo del servidor. -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
